name: Sync & Build BamBuddy Custom

on:
  push:
    branches:
      - vs-production
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Das hier ist neu und behebt den Fehler:
      id-token: write
      actions: write

    steps:
      # ... (alle Schritte bis zum Tagging bleiben gleich) ...

      - name: Sync with Upstream & Get Version
        id: vars
        run: |
          # 1. Upstream einrichten
          git remote add upstream https://github.com/maziggy/bambuddy.git
          git fetch upstream --tags
          
          # 2. Upstream Version bestimmen
          UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "v0.0.0")

          # 3. MERGE-STRATEGIE: Wir mergen, aber behalten UNSERE Workflows
          # Wir starten den Merge, schließen ihn aber nicht sofort ab (--no-commit)
          git merge upstream/main --no-commit --no-ff || true
          
          # Wir setzen den Workflow-Ordner auf unseren Stand zurück
          # Dadurch werden keine fremden Workflows verändert/hinzugefügt
          git checkout HEAD -- .github/workflows
          
          # Jetzt den Merge finalisieren
          git commit -m "chore: sync with upstream $UPSTREAM_TAG (preserved local workflows)" || echo "Nichts zu committen"

          # 4. Build-Zähler ermitteln
          MY_LATEST_BUILD=$(git tag -l "${UPSTREAM_TAG}_*" --sort=-v:refname | head -n 1)
          
          if [ -z "$MY_LATEST_BUILD" ]; then
            BUILD_NUMBER=1
          else
            LAST_NUMBER=$(echo $MY_LATEST_BUILD | sed 's/.*_//')
            BUILD_NUMBER=$((LAST_NUMBER + 1))
          fi
          
          CUSTOM_TAG="${UPSTREAM_TAG}_${BUILD_NUMBER}"
          
          # Outputs setzen
          echo "CUSTOM_TAG=$CUSTOM_TAG" >> $GITHUB_OUTPUT
          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          
          # 5. Nur DAS EINE TAG und den Branch pushen
          git tag $CUSTOM_TAG
          git push origin vs-production
          git push origin refs/tags/$CUSTOM_TAG

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:latest
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.CUSTOM_TAG }}
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.UPSTREAM_TAG }}
