name: Sync & Build BamBuddy Custom

on:
  push:
    branches:
      - vs-production
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: vs-production
          fetch-depth: 0 # Holt alle Tags für den Vergleich

      - name: Setup Git User
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Sync with Upstream & Get Version
        id: vars
        run: |
          # 1. Upstream einrichten
          git remote add upstream https://github.com/maziggy/bambuddy.git
          git fetch upstream --tags
          
          # 2. Das aktuellste Tag vom Original-Repo finden
          # Falls kein Tag existiert, nehmen wir "v0.0.0" als Fallback
          UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "v0.0.0")
          echo "Upstream Version: $UPSTREAM_TAG"

          # 3. Merge durchführen
          if git merge upstream/main --no-edit; then
            echo "Merge erfolgreich."
          else
            echo "KONFLIKT beim Mergen von upstream/main!"
            exit 1
          fi

          # 4. Build-Zähler ermitteln
          # Wir suchen nach deinen Tags, die mit dem Upstream-Tag beginnen (z.B. v1.2.3_*)
          MY_LATEST_BUILD=$(git tag -l "${UPSTREAM_TAG}_*" --sort=-v:refname | head -n 1)
          
          if [ -z "$MY_LATEST_BUILD" ]; then
            BUILD_NUMBER=1
          else
            # Nummer nach dem Unterstrich extrahieren und erhöhen
            LAST_NUMBER=$(echo $MY_LATEST_BUILD | sed 's/.*_//')
            BUILD_NUMBER=$((LAST_NUMBER + 1))
          fi
          
          CUSTOM_TAG="${UPSTREAM_TAG}_${BUILD_NUMBER}"
          echo "Neues Custom Tag: $CUSTOM_TAG"
          
          # Outputs für Docker-Schritt setzen
          echo "CUSTOM_TAG=$CUSTOM_TAG" >> $GITHUB_OUTPUT
          echo "UPSTREAM_TAG=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          
          # 5. Tag erstellen und pushen
          git tag $CUSTOM_TAG
          git push origin vs-production --tags
          git push origin vs-production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:latest
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.CUSTOM_TAG }}
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.UPSTREAM_TAG }}
