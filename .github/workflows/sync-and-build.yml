name: Sync & Build

on:
  push:
    branches:
      - vs-production
  schedule:
    - cron: '0 3 * * *' # Täglich um 03:00 Uhr nachts
  workflow_dispatch: # Erlaubt manuelles Auslösen über das GitHub-UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: vs-production
          fetch-depth: 0 # Wichtig, um alle Tags für den Zähler zu sehen

      - name: Setup Git User
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Sync with Upstream
        run: |
          # Upstream hinzufügen und das neueste Release holen
          git remote add upstream https://github.com/maziggy/bambuddy.git
          git fetch upstream
          
          # Versuchen, upstream/main in deinen Branch vs-production zu mergen
          if git merge upstream/main --no-edit; then
            echo "Sync erfolgreich oder bereits aktuell."
          else
            echo "KONFLIKT: Automatischer Merge fehlgeschlagen. Du musst manuell ran!"
            exit 1
          fi

      - name: Get Version and Increment Build Number
        id: vars
        run: |
          # 1. Version aus der package.json extrahieren
          RAW_VERSION=$(node -p "require('./package.json').version")
          echo "Base Version: $RAW_VERSION"
          
          # 2. Bestehende Tags für diese Version zählen
          # Wir suchen Tags im Format '1.2.3_X' und nehmen das mit der höchsten Zahl
          LATEST_TAG=$(git tag -l "${RAW_VERSION}_*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            # Wenn für diese Version noch kein Tag existiert (neues Release!), starte bei 1
            BUILD_NUMBER=1
          else
            # Extrahiere die Zahl nach dem Unterstrich und erhöhe sie um 1
            LAST_NUMBER=$(echo $LATEST_TAG | awk -F'_' '{print $2}')
            BUILD_NUMBER=$((LAST_NUMBER + 1))
          fi
          
          CUSTOM_TAG="${RAW_VERSION}_${BUILD_NUMBER}"
          echo "New Custom Tag: $CUSTOM_TAG"
          
          # Variablen für die nächsten Schritte speichern
          echo "CUSTOM_TAG=$CUSTOM_TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$RAW_VERSION" >> $GITHUB_OUTPUT
          
          # 3. Das neue Tag lokal setzen und in deinen Fork pushen
          git tag $CUSTOM_TAG
          git push origin vs-production --tags
          # Auch den Merge-Stand (vs-production) pushen
          git push origin vs-production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Wir taggen mit latest, der reinen Version und deiner Build-Version
          tags: |
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:latest
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.CUSTOM_TAG }}
            ghcr.io/${{ github.repository_owner }}/bambuddy-custom:${{ steps.vars.outputs.VERSION }}
